# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to .streamlit/secrets.toml and fill in your values.
# NEVER commit secrets.toml to GitHub — add it to .gitignore.
# On Streamlit Cloud, set these in the app's Secrets settings page.
# ─────────────────────────────────────────────────────────────────────────────

# App password (shown on login screen)
app_password = "YourPasswordHere"

# Email alerts (Gmail — use an App Password, not your real password)
# Get an App Password at: myaccount.google.com/apppasswords
EMAIL_SENDER   = "you@gmail.com"
EMAIL_RECEIVER = "you@gmail.com"
EMAIL_PASSWORD = "your_gmail_app_password"

# QuiverQuant API key (congressional trading data)
# Get one at: quiverquant.com
QUIVER_API_KEY = "your_quiver_api_key"

# SEC EDGAR User-Agent (required by SEC — use your real email)
SEC_USER_AGENT = "Your Name your@email.com"

# Database (optional — leave blank to use SQLite)
# For Postgres (e.g. Neon, Supabase): postgresql://user:pass@host:5432/db
DATABASE_URL = ""

# File paths (optional — defaults used if not set)
# INSIDER_DB_PATH  = "insider_trades.db"
# CONGRESS_DB_PATH = "congress_trades.db"
# ACCURACY_DB_PATH = "accuracy.db"
